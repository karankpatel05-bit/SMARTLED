<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart LED Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.4);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1a233a 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 300;
            font-size: 1.2rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mic-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 2px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .mic-btn.active {
            background: var(--accent);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: scale(1.1);
        }

        .mic-btn svg {
            width: 40px;
            height: 40px;
            fill: var(--accent);
            transition: all 0.3s;
        }

        .mic-btn.active svg { fill: #0b0f19; }

        #transcript {
            min-height: 24px;
            color: var(--text-dim);
            font-style: italic;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.1rem;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        button.manual-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #0b0f19;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        button.primary:hover {
            box-shadow: 0 6px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        button.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        button.danger:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .slider-container {
            width: 100%;
            margin-top: 30px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 30px;
            border: 1px solid var(--glass-border);
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 10px;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        .pulse.off { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        .info-panel {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
        }

    </style>
</head>
<body>

    <h1>Smart Control</h1>
    <div class="subtitle">AI Voice Assistant</div>

    <div class="card">
        <h2>Vision AI Camera</h2>
        <div class="video-container" style="width: 100%; border-radius: 16px; overflow: hidden; border: 2px solid var(--glass-border); background: #000; margin-bottom: 30px;">
            <img src="/video_feed" alt="Camera Feed" style="width: 100%; height: auto; display: block; object-fit: cover;">
        </div>

        <button class="mic-btn" id="micBtn" title="Click to speak">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
        </button>
        <div id="transcript">"Try saying: Turn on, 50%, or Turn off"</div>

        <div class="btn-group">
            <button class="manual-btn primary" onclick="sendCommand(1, 255)">Turn ON</button>
            <button class="manual-btn danger" onclick="sendCommand(0, 0)">Turn OFF</button>
        </div>

        <div class="slider-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Brightness</span>
                <span id="valDisplay" style="font-weight: 600; color: var(--accent);">50%</span>
            </div>
            <input type="range" min="0" max="255" value="127" id="bSlider" oninput="slideChange(this.value)" onchange="slideSet(this.value)">
        </div>

        <div class="status-badge">
            <div class="pulse" id="statusPulse"></div>
            <span id="sysStatus">System Ready</span>
        </div>
    </div>
    
    <div class="info-panel">
        Note: The Python backend automatically runs local hand gesture recognition using your computer's webcam. <br>Show 1-5 fingers to set brightness, or a fist to turn off.
    </div>

    <script>
        const statusPulse = document.getElementById('statusPulse');
        const sysStatus = document.getElementById('sysStatus');
        const valDisplay = document.getElementById('valDisplay');
        const bSlider = document.getElementById('bSlider');

        function updateUI(power, brightness) {
            bSlider.value = brightness;
            let pct = Math.round((brightness / 255) * 100);
            valDisplay.innerText = pct + '%';
            
            if (power == 0) {
                statusPulse.className = 'pulse off';
                sysStatus.innerText = 'LED is OFF';
            } else {
                statusPulse.className = 'pulse';
                sysStatus.innerText = 'LED is ON';
            }
        }

        async function sendCommand(power, brightness) {
            updateUI(power, brightness);
            try {
                await fetch('/api/led', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ power: power, brightness: brightness })
                });
            } catch (e) {
                console.error("API Error", e);
            }
        }

        function slideChange(val) {
            let pct = Math.round((val / 255) * 100);
            valDisplay.innerText = pct + '%';
        }

        function slideSet(val) {
            let power = val > 0 ? 1 : 0;
            sendCommand(power, parseInt(val));
        }

        // Periodically sync UI with backend state (in case gestures changed it)
        setInterval(async () => {
            try {
                let res = await fetch('/api/state');
                let state = await res.json();
                updateUI(state.power, state.brightness);
            } catch (e) {}
        }, 1000);

        // --- VOICE RECOGNITION ---
        const micBtn = document.getElementById('micBtn');
        const transcriptDiv = document.getElementById('transcript');
        let isListening = false;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('active');
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('active');
            };

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                transcriptDiv.innerText = '"' + text + '"';
                
                if (text.includes("turn on") || text.includes("light on")) {
                    sendCommand(1, 255);
                } else if (text.includes("turn off") || text.includes("light off") || text.includes("shut down")) {
                    sendCommand(0, 0);
                } else {
                    const match = text.match(/(\d+)/);
                    if (match) {
                        let pct = Math.min(100, Math.max(0, parseInt(match[1])));
                        let brightness = Math.round((pct / 100) * 255);
                        sendCommand(1, brightness);
                    }
                }
            };

            micBtn.onclick = () => {
                if (isListening) recognition.stop();
                else recognition.start();
            };
        } else {
            transcriptDiv.innerText = "Voice commands not supported in this browser.";
            micBtn.style.opacity = '0.5';
            micBtn.style.cursor = 'not-allowed';
        }
    </script>
</body>
</html>
